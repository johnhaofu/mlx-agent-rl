model:
  path: /Users/junhao/models/Qwen3-4B-MLX-4bit
  quantize: null
  lora:
    rank: 8
    layers: 4
rollout:
  group_size: 8
  max_steps: 6
  max_tokens: 384
  enable_thinking: false
  system_prompt: |
    You are a SQL agent. Given a SQLite schema and a natural-language
    question, write the SQL query that answers it.

    On every turn pick exactly one tool and reply with ONLY this format:

    <action>sql[SELECT … FROM …]</action>          # exploratory query, see real rows / errors
    <action>answer[final SELECT statement]</action>  # commit your final answer

    Use sql[…] to inspect tables, test JOINs, debug column names. When
    confident, call answer[…] with the final SQL. ASCII only, single
    statement per action, no explanation, no markdown fences.
training:
  algorithm: gigpo
  lr: 0.00005
  epochs: 2
  batch_size: 8
  epsilon: 0.2
  epsilon_high: 0.40
  micro_batch_size: 4
  val_interval: 10
  val_temperature: 0.4
  val_top_p: 1.0
  ppo_epochs: 1
  dynamic_sampling: true   # v8 ABLATION: drop zero-variance groups
  kl_coef: 0.0
  clip_ratio_c: 3.0
  entropy_coef: 0.0
  kl_ctrl_type: fixed
  gigpo_mode: mean_norm
  val_before_train: true
environment:
  type: sql_agent
  data_dir: /Users/junhao/mlx-agent-rl/data/spider/spider_data
  split: train
  invalid_action_penalty: -0.1
  use_tools_schema: false
  schema_max_chars: 4000
  rows_per_query: 10
  partial_credit: 0.0      # v4 ABLATION: disable partial credit
memory:
  window_size: 4
mlc:
  enabled: false
llamacpp:
  enabled: false
wandb:
  enabled: true
  project: mlx-agent-rl
  run_name: spider_qwen3_4b_gigpo_v8_dapo_clip
  tags: [qwen3-4b, gigpo, spider, text-to-sql, v8, asymmetric-clip + dynamic-sampling]
