model:
  path: /Users/junhao/models/Qwen3-4B-MLX-4bit
  quantize: null
  lora:
    rank: 8
    layers: 4
rollout:
  group_size: 4
  max_steps: 6              # 3-5 search calls + 1 answer is plenty
  max_tokens: 256
  enable_thinking: false
  system_prompt: |
    Answer the question using the candidate Wikipedia passages. You can
    call search and answer tools.

    Each turn pick exactly one tool and reply with ONLY this format:

    <action>search[concise BM25 query, ~3-6 keywords]</action>
    <action>answer[short factual span, no explanation]</action>

    Strategy: search for facts you need, read the returned passages, then
    answer. Most HotpotQA questions need 1-3 searches. Keep <action>
    arguments short and ASCII-only. No prose, no commentary, no JSON.
training:
  algorithm: gigpo
  lr: 0.00005                # aggressive: 10x baseline, after 4x didn't move val
  epochs: 1
  batch_size: 8             # 8 prompts × 4 group = 32 trajs/batch
  epsilon: 0.2
  epsilon_high: 0.28
  micro_batch_size: 4
  val_interval: 10           # finer-grained learning curve at the cost of ~5min/val
  val_temperature: 0.4
  val_top_p: 1.0
  ppo_epochs: 1
  kl_coef: 0.0                # remove KL anchor — let policy drift freely
  clip_ratio_c: 3.0
  entropy_coef: 0.0
  kl_ctrl_type: fixed
  gigpo_mode: mean_norm
  val_before_train: true
environment:
  type: hotpotqa
  base_url: http://192.168.0.117:3002
  split: train
  use_tools_schema: false
  invalid_action_penalty: -0.1
memory:
  window_size: 4
mlc:
  enabled: false
llamacpp:
  enabled: false
wandb:
  enabled: true
  project: mlx-agent-rl
  run_name: hotpotqa_qwen3_4b_gigpo_lr5e-5_kl0
  tags: [qwen3-4b, gigpo, hotpotqa, search-r1-style, lr-5e-5, no-kl]
