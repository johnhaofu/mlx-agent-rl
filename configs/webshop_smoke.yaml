model:
  path: /Users/junhao/models/Qwen3-4B-MLX-4bit
  quantize: null
  lora:
    rank: 8
    layers: 4
rollout:
  group_size: 4              # smaller group to keep wall-clock < 30 min
  max_steps: 8               # cap turns aggressively for smoke
  max_tokens: 256
  enable_thinking: false
  system_prompt: |
    You are an autonomous shopping agent in the WebShop e-commerce environment.
    Find and buy the product that best matches the instruction.

    Each turn you receive the current page text plus a list of admissible
    actions. Pick exactly one and reply with ONLY this format:

    <action>search[free-text query]</action>      (when search[query] is admissible)
    <action>click[clickable label or asin]</action>  (any other admissible click)

    No prose, no commentary, no JSON. Just one <action>...</action> tag.
    ASCII only inside <action>.
training:
  algorithm: gigpo
  lr: 0.000001
  epochs: 4
  batch_size: 4
  epsilon: 0.2
  epsilon_high: 0.28
  micro_batch_size: 4
  val_interval: 2
  val_temperature: 0.4
  val_top_p: 1.0
  ppo_epochs: 1
  kl_coef: 0.001
  clip_ratio_c: 3.0
  entropy_coef: 0.0
  kl_ctrl_type: fixed
  kl_target: 0.01
  kl_horizon: 200
  gigpo_mode: mean_norm
  val_before_train: true
environment:
  type: webshop
  base_url: http://192.168.0.117:3001
  invalid_action_penalty: -0.1
  use_tools_schema: false
memory:
  window_size: 4
mlc:
  enabled: false
llamacpp:
  enabled: false
wandb:
  enabled: true
  project: mlx-agent-rl
  run_name: webshop_smoke_4epoch
  tags: [qwen3-4b, gigpo, webshop, smoke]
